name: agent-failsafe

on:
  workflow_run:
    workflows: ['CI', 'codex-review', 'codex-docs']
    types: [completed]

jobs:
  open-incident:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Raise incident for repeated agent PR failures
        uses: actions/github-script@v7
        env:
          FAILURE_THRESHOLD: '2'
        with:
          script: |
            const run = context.payload.workflow_run;
            const pullRequest = run.pull_requests?.[0];

            if (!pullRequest) {
              core.info('Workflow run is not linked to a pull request. Skipping.');
              return;
            }

            const { owner, repo } = context.repo;
            const prNumber = pullRequest.number;
            const branch = run.head_branch;

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });

            const labels = pr.data.labels.map((label) => label.name);

            if (!labels.includes('agent:auto')) {
              core.info('PR does not carry the agent:auto label. Skipping incident creation.');
              return;
            }

            const workflowNames = new Set(['CI', 'codex-review', 'codex-docs']);
            const allRuns = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              branch,
              event: 'pull_request',
              status: 'completed',
              per_page: 100
            });

            const failures = allRuns.filter((entry) => workflowNames.has(entry.name) && entry.conclusion === 'failure');
            const threshold = Number(process.env.FAILURE_THRESHOLD || '2');

            if (failures.length < threshold) {
              core.info(`Failure count ${failures.length} is below threshold ${threshold}.`);
              return;
            }

            const issueTitle = `[Agent Incident] Repeated check failures for ${branch}`;

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${issueTitle}"`
            });

            if ((existing.data.items || []).length > 0) {
              core.info('Incident issue already exists.');
              return;
            }

            const failureLines = failures
              .slice(0, 5)
              .map((entry) => `- ${entry.name}: ${entry.html_url}`)
              .join('\n');

            const body = [
              `Automated fail-safe detected repeated CI/review failures for agent PR #${prNumber}.`,
              '',
              `Branch: \`${branch}\``,
              `PR: ${pr.data.html_url}`,
              '',
              'Recent failed runs:',
              failureLines,
              '',
              'Required action:',
              '- Inspect failing checks and fix root cause before allowing further auto-dispatch for this branch.'
            ].join('\n');

            await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body
            });
