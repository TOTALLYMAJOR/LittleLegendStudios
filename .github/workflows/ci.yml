name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: little_legend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d little_legend"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/little_legend
      REDIS_URL: redis://127.0.0.1:6379
      API_PORT: 4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      SMOKE_API_BASE_URL: http://localhost:4000
      WEB_APP_BASE_URL: http://localhost:3000
      PUBLIC_ASSET_BASE_URL: http://localhost:4000/assets
      ASSET_SIGNING_SECRET: dev_asset_signing_secret_change_me
      ASSET_LOCAL_ROOT: /tmp/little-legend-assets
      PROVIDER_INTEGRATION_MODE: stub
      VOICE_PROVIDER_MODE: stub
      SCENE_PROVIDER_MODE: stub
      EMAIL_PROVIDER_MODE: stub
      AUTO_REFUND_ON_FAILURE: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run DB migration
        run: npm --workspace @little/api run migrate

      - name: Start API + Worker and run smoke
        run: |
          set -euo pipefail

          npm --workspace @little/api run dev > /tmp/api.log 2>&1 &
          API_PID=$!

          npm --workspace @little/worker run dev > /tmp/worker.log 2>&1 &
          WORKER_PID=$!

          cleanup() {
            kill "$API_PID" "$WORKER_PID" 2>/dev/null || true
            wait "$API_PID" 2>/dev/null || true
            wait "$WORKER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for attempt in {1..60}; do
            if curl --silent --fail http://localhost:4000/health > /dev/null; then
              echo "API is healthy."
              break
            fi

            sleep 2
          done

          curl --silent --fail http://localhost:4000/health > /dev/null
          npm run smoke

      - name: Print API/Worker logs on failure
        if: failure()
        run: |
          echo "=== API LOG ==="
          cat /tmp/api.log || true
          echo "=== WORKER LOG ==="
          cat /tmp/worker.log || true

      - name: Upload API/Worker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-service-logs
          path: |
            /tmp/api.log
            /tmp/worker.log
          if-no-files-found: ignore
