name: codex-docs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/**"
      - "packages/**"
      - "docs/**"
      - "README.md"
      - "TASKS.md"
      - "AGENTS.md"
      - "scripts/check-docs-sync.mjs"
      - ".github/workflows/agent-*.yml"
      - ".github/workflows/pr-body-contract.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  docs-sync-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Codex docs drift review
        uses: openai/codex-action@v1
        with:
          prompt: |
            Review this pull request for documentation drift.
            Focus on:
            - missing docs updates for behavior changes
            - missing runbook or env var updates
            - duplication that violates docs source-of-truth ownership
            - rollout and rollback clarity
            Output actionable file-level recommendations with severity.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
