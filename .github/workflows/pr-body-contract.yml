name: pr-body-contract

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

jobs:
  require-docs-impact:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR docs impact section
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            if (!body.includes('## Docs impact')) {
              core.setFailed('PR body must include "## Docs impact" (see .github/pull_request_template.md).');
            }
