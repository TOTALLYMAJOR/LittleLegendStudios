services:
  postgres:
    image: postgres:16
    container_name: little-legend-postgres
    environment:
      POSTGRES_DB: little_legend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: little-legend-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
